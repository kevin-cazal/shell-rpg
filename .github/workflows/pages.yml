name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            submodules/v86-runner/package-lock.json

      - name: Install and prepare assets
        run: |
          npm ci
          npm ci --prefix submodules/v86-runner
          npm run prepare
          cp -f public/coi-serviceworker.js submodules/v86-runner/public/

      - name: Build site
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_OFFICIAL_BUNDLE_URL: https://cdn.cazal.eu/shell-rpg-256M.v86b
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
